<router-outlet />

<style>
  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }
  .animate-grid-move { animation: gridMove 3s linear infinite; }
</style>

<footer class="bg-[#0f172a] border-t border-slate-800 pt-16 pb-8 relative overflow-hidden group" (mousemove)="onFooterMouseMove($event)">
  <!-- Background Grid -->
  <div class="absolute inset-0 opacity-[0.05] bg-[linear-gradient(to_right,#ffffff_1px,transparent_1px),linear-gradient(to_bottom,#ffffff_1px,transparent_1px)] bg-[size:40px_40px] animate-grid-move pointer-events-none"></div>

  <!-- Spotlight -->
  <div class="pointer-events-none absolute -inset-px transition duration-300 opacity-0 group-hover:opacity-100 z-0"
       [style.background]="'radial-gradient(600px circle at ' + footerSpotlight().x + 'px ' + footerSpotlight().y + 'px, rgba(6,182,212,0.1), transparent 40%)'"></div>

  <div class="container mx-auto px-6 relative z-10">
    <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-12">
      <div class="text-center md:text-left">
        <h2 class="text-2xl font-black text-white tracking-tight mb-2">
          Mark Dave <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">Camus</span>
        </h2>
        <p class="text-slate-400 text-sm">Building digital products that matter.</p>
      </div>

      <div class="flex gap-6">
        <a href="https://github.com" target="_blank" class="text-slate-400 hover:text-white transition-colors transform hover:scale-110">
          <span class="sr-only">GitHub</span>
          <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
          </svg>
        </a>
        <a href="https://linkedin.com" target="_blank" class="text-slate-400 hover:text-white transition-colors transform hover:scale-110">
          <span class="sr-only">LinkedIn</span>
          <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
             <path fill-rule="evenodd" d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" clip-rule="evenodd" />
          </svg>
        </a>
        <a href="mailto:markdavecamus@gmail.com" class="text-slate-400 hover:text-white transition-colors transform hover:scale-110">
          <span class="sr-only">Email</span>
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </a>
      </div>
    </div>

    <div class="border-t border-slate-800 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
      <p class="text-slate-500 text-sm">
        &copy; 2025 Mark Dave Camus. All rights reserved.
      </p>
      <div class="flex items-center gap-2 text-sm text-slate-500">
        <span>Built with</span>
        <span class="text-white font-bold">Angular</span>
        <span>&</span>
        <span class="text-white font-bold">Tailwind</span>
      </div>
    </div>
  </div>
</footer>
