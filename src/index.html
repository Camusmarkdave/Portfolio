<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MyPortfolio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="assets/uploads/logo.png">
  <style>
    body { margin: 0; background-color: #0f172a; font-family: system-ui, -apple-system, sans-serif; }
    .loading-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; 
    }
    .loading-logo { 
      width: 60vw; max-width: 500px; height: auto; 
      animation: breathe 10s ease-in-out infinite; 
      filter: drop-shadow(0 0 30px rgba(6,182,212,0.4)); 
    }
    @keyframes breathe { 0%, 100% { transform: scale(0.95); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 60px rgba(6,182,212,0.6)); } }
  </style>
</head>
<body>
  <app-root>
    <div class="loading-overlay">
      <img src="assets/uploads/logo.png" alt="Loading..." class="loading-logo">
    </div>
  </app-root>
</body>
</html>
